<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias - Movilidad UNAC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }

        /* NAVBAR (Mantenemos tu estilo) */
        .navbar { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #0a0a0a; border-bottom: 1px solid #222; sticky: top; }
        .logo span { color: #ffb400; }
        .menu a { color: #fff; text-decoration: none; margin-left: 15px; font-size: 0.9rem; }
        .menu a.active { color: #ffb400; font-weight: bold; }

        .container { max-width: 1000px; margin: 50px auto; padding: 0 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 30px; text-align: center; }

        /* GRID DE NOTICIAS */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .news-card { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .news-card:hover { border-color: #ffb400; transform: translateY(-5px); }
        
        /* ESTILO PARA LA IMAGEN EN LA TARJETA (Los buses UNAC) */
        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Recorta la imagen para que quepa sin estirarse */
            border-bottom: 1px solid #222;
        }

        .news-content { padding: 20px; }
        .news-date { color: #ffb400; font-size: 0.8rem; font-weight: bold; }
        .news-title { font-size: 1.2rem; margin: 10px 0; color: #fff; } /* Título en blanco */
        .news-excerpt { color: #ccc; font-size: 0.9rem; line-height: 1.4; } /* Texto gris claro */

        /* MODALES (LAS VENTANAS QUE SE ABREN) */
        .modal {
            display: none; /* Escondido por defecto */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #111;
            width: 90%;
            max-width: 700px;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #333;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            text-align: left; /* Alinear texto a la izquierda dentro del modal */
        }

        /* ESTILO PARA LA IMAGEN DENTRO DEL MODAL (También los buses UNAC) */
        .modal-content img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
            height: auto;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 2rem;
            color: #ffb400;
            cursor: pointer;
        }
    </style>
</head>
