<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Movilidad UNAC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('Azul Viaje Ofertas y Descuentos Sitio Web (2).png'); 
            background-size: cover; background-attachment: fixed; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .navbar { width: 100%; display: flex; justify-content: space-between; padding: 15px 5%; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: bold; color: #ffb400; font-size: 0.9rem; }
        .menu a { color: #fff; text-decoration: none; margin-left: 15px; font-size: 0.8rem; }
        .main { padding: 40px 20px; text-align: center; width: 100%; max-width: 800px; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 30px; border-radius: 15px; margin-top: 20px; border: 1px solid rgba(255,180,0,0.2); }
        input { width: 100%; max-width: 300px; padding: 12px; border-radius: 5px; border: 1px solid #ffb400; background: #000; color: #fff; text-align: center; font-size: 1.1rem; }
        button { background: #ffb400; color: #000; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .results { display: none; margin-top: 30px; text-align: left; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; }
        .data-row { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .data-row b { color: #ffb400; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MOVILIDAD UNAC<br><span>RUTA VENTANILLA</span></div>
        <div class="menu">
            <a href="index.html">Inicio</a>
            <a href="registro.html" style="color:#ffb400">Registro</a>
            <a href="consultas.html">Consultas</a>
        </div>
    </nav>
    <div class="main">
        <h1>Consulta de Padrón 2026-A</h1>
        <div class="card">
            <input type="text" id="dniInput" placeholder="Ingresa tu DNI">
            <br>
            <button id="searchBtn">BUSCAR ALUMNO</button>
            <div id="results" class="results">
                <div class="data-row"><b>Estudiante:</b> <p id="nombresRes"></p></div>
                <div class="data-row"><b>Código:</b> <p id="codigoRes"></p></div>
                <div class="data-row"><b>Facultad:</b> <p id="facultadRes"></p></div>
                <div class="data-row"><b>Horario:</b> <p id="horarioRes"></p></div>
                <div class="data-row"><b>Asiento:</b> <p id="asientoRes" style="color:#a6f3b7; font-weight:bold"></p></div>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzvOKvaSny1fecoF3Sd18Nsu3GlQgNfvUtEA1bPHiFXJVSlbkmSO47bwS71_dTbC5-Q/exec';
        const searchBtn = document.getElementById('searchBtn');
        searchBtn.addEventListener('click', () => {
            const dni = document.getElementById('dniInput').value.trim();
            if(!dni) return alert("Ingresa un DNI");
            searchBtn.innerText = "BUSCANDO...";
            fetch(API_URL + '?dni=' + dni)
                .then(r => r.json())
                .then(data => {
                    searchBtn.innerText = "BUSCAR ALUMNO";
                    if(data.found){
                        document.getElementById('nombresRes').innerText = data.Nombres;
                        document.getElementById('codigoRes').innerText = data.Codigo;
                        document.getElementById('facultadRes').innerText = data.Facultad;
                        document.getElementById('horarioRes').innerText = data.Horario;
                        document.getElementById('asientoRes').innerText = data.Asiento;
                        document.getElementById('results').style.display = 'block';
                    } else {
                        alert("El DNI " + dni + " no está registrado.");
                    }
                }).catch(() => {
                    searchBtn.innerText = "BUSCAR ALUMNO";
                    alert("Error de conexión con la base de datos.");
                });
        });
    </script>
</body>
</html>
